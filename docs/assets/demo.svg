<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="800" height="440" rx="10" fill="#0d1117"/>
  <rect width="800" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="400" y="21" fill="#8b949e" text-anchor="middle">gqlsift — breakage verdicts against real recorded queries</text>

  <text x="24" y="64" fill="#7ee787">$ gqlsift diff schema-v1.graphql schema-v2.graphql --ops operations/</text>
  <text x="24" y="88" fill="#c9d1d9">6 recorded operations consulted</text>

  <text x="24" y="118" fill="#f85149">BREAKING (6)</text>
  <text x="24" y="140" fill="#c9d1d9">  B103 User.email — field "email" was removed from type "User"</text>
  <text x="24" y="160" fill="#c9d1d9">       impact: <tspan fill="#f85149">BREAKS GetUser</tspan> (operations/get-user.graphql)</text>
  <text x="24" y="180" fill="#c9d1d9">  B103 User.nickname — field "nickname" was removed from type "User"</text>
  <text x="24" y="200" fill="#c9d1d9">       impact: <tspan fill="#3fb950">unreferenced by the recorded operations</tspan></text>
  <text x="24" y="220" fill="#c9d1d9">  B108 Role.GUEST — enum value "GUEST" was removed from enum "Role"</text>
  <text x="24" y="240" fill="#c9d1d9">       impact: <tspan fill="#f85149">BREAKS ListGuests</tspan> · <tspan fill="#d29922">MAY BREAK UsersByRole</tspan></text>

  <text x="24" y="270" fill="#d29922">DANGEROUS (3)</text>
  <text x="24" y="292" fill="#c9d1d9">  D203 User.posts(first:) — default value of argument "User.posts(first:)" changed from 10 to 20</text>
  <text x="24" y="312" fill="#c9d1d9">       impact: <tspan fill="#d29922">MAY BREAK Feed</tspan> (operations/feed.graphql)</text>

  <text x="24" y="342" fill="#3fb950">SAFE (4)</text>
  <text x="24" y="364" fill="#c9d1d9">  S304 Post.body — field "Post.body" was deprecated ("Use excerpt fields once they land")</text>

  <text x="24" y="398" fill="#c9d1d9">6 breaking (<tspan fill="#f85149">5 confirmed</tspan> against recorded operations, <tspan fill="#3fb950">1 unreferenced</tspan>) · 3 dangerous · 4 safe</text>
  <text x="24" y="420" fill="#8b949e">exit 1  —  gate CI on --fail-on impacted to block only real breakage</text>
</svg>
